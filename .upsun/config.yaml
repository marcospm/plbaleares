services:
  redis:
    type: redis:7.0

applications:
  app:
    source:
      root: "/"

    type: "php:8.4"

    build:
        flavor: none  # Desactivar build flavor automático para controlar composer install manualmente

    web:
      locations:
        "/":
          root: "public"
          passthru: "/index.php"
          index:
            - index.php
          scripts: true
          allow: true

        "/build":
          root: "public/build"
          allow: true
          passthru: false
          scripts: false
          expires: 365d

        "/assets":
          root: "public/assets"
          allow: true
          passthru: false
          scripts: false
          expires: 365d

    relationships:
      database: "database:mysql"
      redis: "redis:redis"

    mounts:
      "/var": "shared:files/var"

      # Uploads persistentes (se conservan entre despliegues)
      "/public/uploads": "shared:files/uploads"
      "/public/examenes": "shared:files/examenes"
      "/public/pdf_municipales": "shared:files/pdf_municipales"
      "/public/pdfs": "shared:files/pdfs"
      "/public/recursos_especificos": "shared:files/recursos_especificos"
      "/public/videos": "shared:files/videos"

    variables:
      env:
        APP_ENV: "prod"
        APP_DEBUG: "1"
        APP_SECRET: "a4f9fd292b86d214adcd16b1496e853dd56ecc807fae04e316b26a6079690b72"

    hooks:
      build: |
        set -e

        # Crear directorios (montajes) si no existen
        mkdir -p \
          public/uploads \
          public/examenes \
          public/pdf_municipales \
          public/pdfs \
          public/recursos_especificos \
          public/videos

        # Ejecutar composer install sin scripts (cache:clear requiere REDIS_URL que no está disponible durante el build)
        # Los scripts se ejecutarán en el deploy hook donde REDIS_URL está disponible desde PLATFORM_RELATIONSHIPS
        composer install \
          --no-interaction \
          --prefer-dist \
          --no-progress \
          --no-dev \
          --no-scripts \
          --optimize-autoloader

        # Compilar assets (Asset Mapper)
        php bin/console asset-map:compile --env=prod

      deploy: |
        set -e

        # REDIS_URL se configura automáticamente desde PLATFORM_RELATIONSHIPS en public/index.php
        # Para comandos de consola, necesitamos configurarlo manualmente usando el ConfigReader de Platform.sh
        # Esto asegura que REDIS_URL esté disponible cuando ejecutamos comandos de Symfony
        if [ -n "$PLATFORM_RELATIONSHIPS" ]; then
          php -r "
            require_once 'vendor/autoload.php';
            use Platformsh\ConfigReader\Config;
            try {
              \$config = new Config();
              \$redisCreds = \$config->credentials('redis');
              if (!empty(\$redisCreds['host'])) {
                if (!empty(\$redisCreds['password'])) {
                  \$redisUrl = sprintf('redis://:%s@%s:%s', rawurlencode(\$redisCreds['password']), \$redisCreds['host'], \$redisCreds['port']);
                } else {
                  \$redisUrl = sprintf('redis://%s:%s', \$redisCreds['host'], \$redisCreds['port']);
                }
                putenv('REDIS_URL=' . \$redisUrl);
                \$_ENV['REDIS_URL'] = \$redisUrl;
                \$_SERVER['REDIS_URL'] = \$redisUrl;
              }
            } catch (\Exception \$e) {
              // Redis no está disponible
            }
          " || true
        fi

        # Ejecutar scripts de composer que se saltaron durante el build
        # (cache:clear, assets:install, importmap:install)
        composer run-script post-install-cmd --no-interaction || true

        # Cache Symfony (asegurar que está limpio)
        php bin/console cache:clear --env=prod --no-warmup
        php bin/console cache:warmup --env=prod --no-optional-warmers

        # Migraciones Doctrine
        php bin/console doctrine:migrations:migrate \
          --no-interaction \
          --allow-no-migration