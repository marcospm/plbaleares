services:
  redis:
    type: redis:7.0

applications:
  app:
    source:
      root: "/"

    type: "php:8.4"

    web:
      locations:
        "/":
          root: "public"
          passthru: "/index.php"
          index:
            - index.php
          scripts: true
          allow: true

        "/build":
          root: "public/build"
          allow: true
          passthru: false
          scripts: false
          expires: 365d

        "/assets":
          root: "public/assets"
          allow: true
          passthru: false
          scripts: false
          expires: 365d

    relationships:
      database: "database:mysql"
      redis: "redis:redis"

    mounts:
      "/var": "shared:files/var"

      # Uploads persistentes (se conservan entre despliegues)
      "/public/uploads": "shared:files/uploads"
      "/public/examenes": "shared:files/examenes"
      "/public/pdf_municipales": "shared:files/pdf_municipales"
      "/public/pdfs": "shared:files/pdfs"
      "/public/recursos_especificos": "shared:files/recursos_especificos"
      "/public/videos": "shared:files/videos"

    variables:
      env:
        APP_ENV: "prod"
        APP_DEBUG: "1"
        APP_SECRET: "a4f9fd292b86d214adcd16b1496e853dd56ecc807fae04e316b26a6079690b72"

    hooks:
      build: |
        set -e

        # Crear directorios (montajes) si no existen
        mkdir -p \
          public/uploads \
          public/examenes \
          public/pdf_municipales \
          public/pdfs \
          public/recursos_especificos \
          public/videos

        # Definir REDIS_URL y default_redis_url para el build
        # Durante el build, REDIS_URL puede no estar disponible, así que usamos un valor por defecto
        # default_redis_url se usa como fallback en la configuración de cache.yaml
        export REDIS_URL="${REDIS_URL:-redis://localhost:6379}"
        export default_redis_url="redis://localhost:6379"

        # Ejecutar composer install (los scripts ahora pueden ejecutarse porque REDIS_URL está definida)
        composer install \
          --no-dev \
          --prefer-dist \
          --no-progress \
          --no-interaction \
          --optimize-autoloader

        # Compilar assets (Asset Mapper)
        php bin/console asset-map:compile --env=prod

      deploy: |
        set -e

        # Configurar REDIS_URL desde PLATFORM_RELATIONSHIPS si está disponible
        # En Upsun, las relaciones están disponibles en runtime (deploy hook)
        if [ -n "$PLATFORM_RELATIONSHIPS" ]; then
          REDIS_HOST=$(echo "$PLATFORM_RELATIONSHIPS" | base64 -d | jq -r '.redis[0].host // empty')
          REDIS_PORT=$(echo "$PLATFORM_RELATIONSHIPS" | base64 -d | jq -r '.redis[0].port // empty')
          REDIS_PASSWORD=$(echo "$PLATFORM_RELATIONSHIPS" | base64 -d | jq -r '.redis[0].password // empty')
          
          if [ -n "$REDIS_HOST" ] && [ -n "$REDIS_PORT" ]; then
            if [ -n "$REDIS_PASSWORD" ]; then
              export REDIS_URL="redis://:$(echo "$REDIS_PASSWORD" | sed 's/[\/&]/\\&/g')@$REDIS_HOST:$REDIS_PORT"
            else
              export REDIS_URL="redis://$REDIS_HOST:$REDIS_PORT"
            fi
          fi
        fi

        # Ejecutar scripts de composer que se saltaron durante el build
        # (cache:clear, assets:install, importmap:install)
        if [ -n "$REDIS_URL" ]; then
          composer run-script post-install-cmd --no-interaction || true
        fi

        # Cache Symfony (asegurar que está limpio)
        php bin/console cache:clear --env=prod --no-warmup
        php bin/console cache:warmup --env=prod --no-optional-warmers

        # Migraciones Doctrine
        php bin/console doctrine:migrations:migrate \
          --no-interaction \
          --allow-no-migration