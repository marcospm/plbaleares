framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # The "app" cache stores to the filesystem by default.
        # The data in this cache should persist between deploys.
        # Other options include:

        # Redis - configurado para usar Redis si está disponible, sino filesystem
        #app: cache.adapter.redis
        # En Upsun, REDIS_URL se proporciona automáticamente cuando defines redis en relationships
        # En local, si no defines REDIS_URL, se usará redis://localhost por defecto (ver configuración condicional abajo)

        # APCu (not recommended with heavy random-write workloads as memory fragmentation can cause perf issues)
        #app: cache.adapter.apcu

        # Namespaced pools use the above "app" backend by default
        pools:
            # Pools de caché - en local usan filesystem, en producción usan Redis (ver configuración condicional)
            cache.partidas:
                adapter: cache.adapter.filesystem  # Fallback para local
            cache.boe:
                adapter: cache.adapter.filesystem  # Fallback para local
            cache.queries:
                adapter: cache.adapter.filesystem  # Fallback para local
                default_lifetime: 3600  # 1 hora para consultas comunes (leyes, temas, convocatorias)
            # Pool de Redis - en local usa filesystem como fallback, en producción usa Redis
            # En local (Windows), este pool usa filesystem para evitar errores si Redis no está instalado
            # En producción, se reemplaza con Redis usando REDIS_URL (ver configuración condicional abajo)
            cache.redis:
                adapter: cache.adapter.filesystem  # Fallback para local
                default_lifetime: 3600

# Configuración para producción: Migrar pools a Redis
# En producción, REDIS_URL debe estar definida en las variables de entorno
# Funciona en cualquier entorno (Upsun, otros cloud providers, servidores propios, etc.)
# En local, todos los pools usan filesystem como fallback (compatible sin Redis)
when@prod:
    framework:
        cache:
            pools:
                # Migrar pools de aplicación a Redis en producción
                cache.partidas:
                    adapter: cache.adapter.redis
                    provider: '%env(REDIS_URL)%'
                cache.boe:
                    adapter: cache.adapter.redis
                    provider: '%env(REDIS_URL)%'
                cache.queries:
                    adapter: cache.adapter.redis
                    provider: '%env(REDIS_URL)%'
                    default_lifetime: 3600
                # Pool principal de Redis
                cache.redis:
                    adapter: cache.adapter.redis
                    # REDIS_URL es obligatoria en producción - debe estar definida en las variables de entorno
                    provider: '%env(REDIS_URL)%'