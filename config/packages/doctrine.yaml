doctrine:
  dbal:
    url: '%env(resolve:DATABASE_URL)%'
    server_version: 'mariadb-11.4.0'
    charset: utf8mb4
    default_table_options:
      charset: utf8mb4
      collate: utf8mb4_unicode_ci

    profiling_collect_backtrace: '%kernel.debug%'

  orm:
    validate_xml_mapping: true
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware

    mappings:
      App:
        type: attribute
        is_bundle: false
        dir: '%kernel.project_dir%/src/Entity'
        prefix: 'App\Entity'
        alias: App

    controller_resolver:
      auto_mapping: false

when@test:
  doctrine:
    dbal:
      dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
  doctrine:
    orm:
      query_cache_driver:
        type: pool
        pool: doctrine.system_cache_pool
      result_cache_driver:
        type: pool
        pool: doctrine.result_cache_pool

  framework:
    cache:
      pools:
        # Doctrine cache pools - usar Redis en producción para mejor rendimiento
        # Durante el build, si REDIS_URL no está disponible, se usará default_redis_url como fallback
        # En runtime, REDIS_URL se configurará automáticamente desde PLATFORM_RELATIONSHIPS
        # default_redis_url se define en el build hook de .upsun/config.yaml
        doctrine.result_cache_pool:
          adapter: cache.adapter.redis
          provider: '%env(default:REDIS_URL:default_redis_url)%'
        doctrine.system_cache_pool:
          adapter: cache.adapter.redis
          provider: '%env(default:REDIS_URL:default_redis_url)%'
