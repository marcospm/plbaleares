# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    leyes_boe: {}

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Servicio de versionado de assets
    App\Service\AssetVersionService: ~
    App\Service\AssetVersionStrategy:
        arguments:
            $versionService: '@App\Service\AssetVersionService'
    
    # Servicio de partidas multijugador
    App\Service\PartidaPreguntasService:
        arguments:
            $cache: '@cache.partidas'
    
    # Servicio de BOE con caché (usa cache.app)
    App\Service\BoeLeyService:
        arguments:
            $cache: '@cache.app'
    
    # Repositorios con cache para consultas comunes
    App\Repository\LeyRepository:
        arguments:
            $cache: '@cache.queries'
    
    App\Repository\TemaRepository:
        arguments:
            $cache: '@cache.queries'
    
    App\Repository\ConvocatoriaRepository:
        arguments:
            $cache: '@cache.queries'
    
    App\Repository\ExamenRepository:
        arguments:
            $cache: '@cache.redis'  # Usar cache.redis para mejor rendimiento (Redis en prod, filesystem en local)
    
    App\Repository\MunicipioRepository:
        arguments:
            $cache: '@cache.queries'
    
    App\Repository\TemaMunicipalRepository:
        arguments:
            $cache: '@cache.queries'
    
    # UserRepository con caché para login rápido
    App\Repository\UserRepository:
        arguments:
            $cache: '@cache.redis'
    
    # Event listener para invalidar cache automáticamente
    App\EventListener\CacheInvalidationSubscriber:
        arguments:
            $leyRepository: '@App\Repository\LeyRepository'
            $temaRepository: '@App\Repository\TemaRepository'
            $convocatoriaRepository: '@App\Repository\ConvocatoriaRepository'
            $municipioRepository: '@App\Repository\MunicipioRepository'
            $temaMunicipalRepository: '@App\Repository\TemaMunicipalRepository'
            $examenRepository: '@App\Repository\ExamenRepository'
            $userRepository: '@App\Repository\UserRepository'
            $cache: '@cache.redis'  # Usar cache.redis para invalidación (Redis en prod, filesystem en local)
        tags:
            - { name: doctrine.event_listener, event: postPersist }
            - { name: doctrine.event_listener, event: postUpdate }
            - { name: doctrine.event_listener, event: postRemove }
    
    # DashboardController con caché para métricas
    App\Controller\DashboardController:
        arguments:
            $cache: '@cache.redis'
    
    # ExamenController con caché para lista de exámenes del profesor
    App\Controller\ExamenController:
        arguments:
            $cache: '@cache.redis'
    
    # Configurar RedisController con los servicios de Redis
    # En producción (Upsun), cache.redis usa Redis y funcionará correctamente
    # En local, cache.redis usa filesystem como fallback, así que el controlador funcionará pero no usará Redis real
    App\Controller\RedisController:
        arguments:
            $redisCache: '@cache.redis'
            $redisPool: '@cache.redis'